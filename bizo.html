<!doctype html>
<html lang="he" dir="rtl">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Biz'o — מנהל הסושיאל שלכם בוואטסאפ</title>
<link rel="icon" type="image/svg+xml" href="assets/bizo-favicon.svg">
<link rel="stylesheet" href="styles.css">
<script src="_ds_bundle.js"></script>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; }
  body { font-family: var(--font-body); color: var(--text-strong); background: var(--white); }
  .bz-page { overflow-x: hidden; }
  .bz-wrap { max-width: 1160px; margin: 0 auto; padding: 0 24px; }
  h1, h2, h3 { font-family: var(--font-display); margin: 0; }
  a { color: inherit; }
  .bz-accent { color: var(--bizo-orange-500); }
  .bz-text-link { font-weight: 600; color: var(--bizo-orange-700); text-decoration: none; white-space: nowrap; }
  .bz-text-link:hover { color: var(--bizo-orange-800); }

  /* ---------- NAV — 1:1 attention ratio, no exit ramp links ---------- */
  .bz-nav { position: sticky; top: 0; z-index: 100; background: rgba(255,255,255,.9); backdrop-filter: blur(12px); border-bottom: 1px solid var(--line); }
  .bz-nav-in { display: flex; align-items: center; justify-content: space-between; height: 66px; }
  .bz-logo { display: inline-flex; align-items: center; gap: 9px; font-family: var(--font-display); font-weight: 800; font-size: 23px; color: var(--bizo-orange-600); text-decoration: none; letter-spacing: -.01em; }
  .bz-logo img { width: 34px; height: 34px; border-radius: 50%; box-shadow: var(--shadow-xs); }

  /* ---------- HERO ---------- */
  .bz-hero { position: relative; background: radial-gradient(120% 80% at 80% 0%, #FFF1D8 0%, #FFF7EA 38%, #FFFFFF 72%); padding-top: 0; overflow: hidden; }
  .bz-hero-in { display: grid; grid-template-columns: 1fr 1.1fr; gap: 0; align-items: center; padding-top: 0; padding-bottom: 0; min-height: 520px; }
  .bz-hero-copy { padding: 60px 48px 60px 0; }
  .bz-trust-bar { display: flex; align-items: center; gap: 7px; font-size: 14.5px; color: var(--text-muted); font-weight: 500; }
  .bz-trust-bar strong { color: var(--text-strong); font-weight: 700; }
  .bz-sep { color: var(--ink-300); }
  .bz-hero-copy h1 { font-size: 68px; line-height: 1.04; font-weight: 800; letter-spacing: -.025em; margin: 14px 0 0; }
  .bz-sub { font-size: 18px; line-height: 1.65; color: var(--text-body); max-width: 30em; margin: 18px 0 0; }
  .bz-microcopy { font-size: 13px; color: var(--text-muted); font-weight: 500; margin-top: 12px; }
  .bz-hero-visual { align-self: stretch; display: flex; align-items: flex-end; justify-content: center; }
  .bz-robot { width: 90%; max-width: none; height: 100%; object-fit: contain; object-position: bottom center; display: block; filter: drop-shadow(0 16px 36px rgba(140,70,0,.13)); pointer-events: none; }

  /* marquee */
  .bz-marquee { border-top: 1px solid var(--line); border-bottom: 1px solid var(--line); background: var(--surface-1); padding: 13px 0; margin-top: 0; overflow: hidden; }
  .bz-marquee-row { display: flex; gap: 18px; align-items: center; white-space: nowrap; width: max-content; animation: bz-scroll 26s linear infinite; color: var(--text-muted); font-weight: 600; font-size: 15px; }
  .bz-marquee-row i { color: var(--bizo-orange-300); font-style: normal; }
  @keyframes bz-scroll { from { transform: translateX(0); } to { transform: translateX(50%); } }



  /* ---------- CONTRAST (before/after + who NOT for) ---------- */
  .bz-contrast { padding: 74px 0; background: var(--white); }
  .bz-before-after { display: grid; grid-template-columns: 1fr 36px 1fr; gap: 0; align-items: center; margin-bottom: 52px; }
  .bz-before, .bz-after { background: var(--surface-2); border-radius: var(--radius-lg); padding: 28px 26px; }
  .bz-after { background: var(--bizo-orange-50); border: 1.5px solid var(--bizo-orange-200); }
  .bz-ba-label { font: var(--fw-bold) 13px var(--font-body); text-transform: uppercase; letter-spacing: .08em; margin-bottom: 16px; }
  .bz-label-before { color: var(--ink-400); }
  .bz-label-after { color: var(--bizo-orange-600); }
  .bz-before ul, .bz-after ul { list-style: none; padding: 0; margin: 0; display: flex; flex-direction: column; gap: 12px; }
  .bz-before li, .bz-after li { font-size: 15.5px; line-height: 1.45; color: var(--text-body); }
  .bz-arrow { text-align: center; font-size: 26px; color: var(--bizo-orange-400); }
  .bz-built-for { text-align: center; margin-bottom: 52px; }
  .bz-built-for h2 { font-size: 32px; font-weight: 800; letter-spacing: -.02em; color: var(--text-strong); margin: 0; line-height: 1.2; }
  .bz-built-for p { font-size: 17.5px; color: var(--text-muted); margin: 14px auto 0; max-width: 40em; line-height: 1.6; }
  .bz-not-for { background: var(--surface-2); border-radius: var(--radius-lg); padding: 26px 28px; }
  .bz-not-label { font: var(--fw-semibold) 15px var(--font-body); color: var(--text-muted); margin: 0 0 16px; }
  .bz-not-grid { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
  .bz-not-card { display: flex; gap: 10px; align-items: flex-start; }
  .bz-not-card span { font-size: 18px; color: var(--ink-300); flex: none; line-height: 1.4; }
  .bz-not-card p { font-size: 14.5px; color: var(--text-muted); line-height: 1.5; margin: 0; }

  /* ---------- MECHANISM ---------- */
  .bz-mechanism { padding: 84px 0; background: linear-gradient(180deg, #FFF7EA, #FFFDF8); }
  .bz-mech-in { display: grid; grid-template-columns: 1fr 1fr; gap: 56px; align-items: start; margin-top: 52px; }
  /* Vertical steps */
  .bz-steps-v { display: flex; flex-direction: column; }
  .bz-step-v { display: grid; grid-template-columns: 56px 1fr; gap: 16px; position: relative; }
  .bz-step-top { display: flex; flex-direction: column; align-items: center; gap: 0; }
  .bz-step-n { width: 36px; height: 36px; border-radius: 50%; background: var(--bizo-orange-500); color: #fff; font-family: var(--font-display); font-weight: 800; font-size: 17px; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-brand); flex: none; }
  .bz-step-icon { font-size: 22px; margin-top: 6px; }
  .bz-step-connector { width: 2px; background: var(--bizo-orange-200); height: 28px; margin: 4px 0 4px 17px; }
  .bz-step-body { padding-bottom: 10px; }
  .bz-step-body h3 { font-size: 19px; margin: 4px 0 8px; line-height: 1.3; }
  .bz-step-body p { font-size: 15px; color: var(--text-body); line-height: 1.65; margin: 0; }
  /* Demo GIF */
  .bz-mech-gif { position: sticky; top: 88px; border-radius: var(--radius-xl); overflow: hidden; box-shadow: var(--shadow-lg); }
  .bz-mech-gif img { display: block; width: 100%; height: auto; }

  /* ---------- PROOF ---------- */
  .bz-proof { padding: 52px 0; background: var(--surface-2); }
  .bz-testi-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
  .bz-testi { background: var(--surface-1); border-radius: var(--radius-lg); padding: 26px 24px; box-shadow: var(--shadow-sm); border: 1px solid var(--line); }
  .bz-stars { font-size: 16px; margin-bottom: 12px; }
  .bz-quote { font-size: 16px; line-height: 1.65; color: var(--text-body); margin: 0 0 16px; font-style: italic; }
  .bz-attrib { display: flex; flex-direction: column; gap: 2px; }
  .bz-attrib strong { font-size: 14.5px; color: var(--text-strong); }
  .bz-attrib span { font-size: 13px; color: var(--text-muted); }
  .bz-proof-inline { margin-top: 36px; max-width: 640px; margin-inline: auto; }

  /* ---------- VIDEO FEATURE ---------- */
  .bz-video-feat { padding: 80px 0; background: var(--ink-900); color: var(--white); }
  .bz-video-feat .bz-st { color: #fff; }
  .bz-eyebrow { font: var(--fw-semibold) 13px var(--font-body); text-transform: uppercase; letter-spacing: .1em; color: var(--bizo-orange-400); margin-bottom: 14px; }
  .bz-vf-in { display: grid; grid-template-columns: 1fr 1fr; gap: 48px; align-items: center; }
  .bz-vf-copy h2 { font-size: 46px; font-weight: 800; line-height: 1.1; letter-spacing: -.02em; margin: 0 0 16px; }
  .bz-vf-copy p { font-size: 17px; color: rgba(255,255,255,.75); line-height: 1.65; margin: 0; }
  .bz-vf-outputs { display: flex; align-items: center; gap: 16px; }
  .bz-vf-input { background: rgba(255,255,255,.07); border: 1px solid rgba(255,255,255,.12); border-radius: var(--radius-lg); padding: 20px 24px; text-align: center; flex: none; }
  .bz-vf-phone-icon { font-size: 42px; }
  .bz-vf-arrow-label { font-size: 13px; color: rgba(255,255,255,.55); margin-top: 6px; }
  .bz-vf-eq { font-size: 28px; color: var(--bizo-orange-400); flex: none; }
  .bz-vf-cards { display: flex; flex-direction: column; gap: 10px; flex: 1; }
  .bz-vf-card { display: flex; align-items: center; gap: 12px; background: rgba(255,255,255,.07); border-radius: var(--radius-md); padding: 11px 14px; border: 1px solid rgba(255,255,255,.09); }
  .bz-vf-card > span { font-size: 22px; flex: none; }
  .bz-vf-card div { display: flex; flex-direction: column; gap: 1px; }
  .bz-vf-card strong { font-size: 14px; color: #fff; }
  .bz-vf-card span { font-size: 12.5px; color: rgba(255,255,255,.55); }

  /* ---------- PRICING ---------- */
  .bz-pricing { padding: 84px 0; background: var(--surface-2); }
  .bz-tiers { display: grid; grid-template-columns: repeat(3,1fr); gap: 22px; margin-top: 48px; align-items: start; }
  .bz-tier { background: var(--surface-1); border: 1px solid var(--line); border-radius: var(--radius-xl); padding: 30px 26px; box-shadow: var(--shadow-sm); position: relative; }
  .bz-tier-pop { border: 2px solid var(--bizo-orange-400); box-shadow: var(--shadow-md); transform: translateY(-8px); }
  .bz-tier-flag { position: absolute; top: -14px; inset-inline-start: 26px; }
  .bz-tier-names { display: flex; flex-direction: column; gap: 3px; }
  .bz-tier h3 { font-size: 20px; line-height: 1.2; }
  .bz-tier-en { font-size: 13px; color: var(--text-muted); font-weight: 500; }
  .bz-tier-tag { color: var(--text-muted); font-size: 14px; margin: 8px 0 0; line-height: 1.45; }
  .bz-tier-price { display: flex; align-items: baseline; gap: 7px; margin: 18px 0 4px; }
  .bz-amt { font-family: var(--font-display); font-weight: 800; font-size: 44px; color: var(--text-strong); letter-spacing: -.02em; }
  .bz-per { color: var(--text-muted); font-size: 15px; font-weight: 600; }
  .bz-tier ul { list-style: none; padding: 0; margin: 18px 0 22px; display: flex; flex-direction: column; gap: 11px; }
  .bz-tier li { display: flex; align-items: flex-start; gap: 9px; font-size: 14.5px; color: var(--text-body); line-height: 1.4; }
  .bz-check { color: var(--success); font-weight: 800; flex: none; }
  .bz-trust-badges { display: flex; flex-wrap: wrap; justify-content: center; gap: 18px; margin-top: 36px; font-size: 14px; color: var(--text-muted); font-weight: 600; }

  /* ---------- FAQ ---------- */
  .bz-faq { padding: 84px 0; background: var(--white); }
  .bz-faq-wrap { max-width: 760px; }
  .bz-faq-list { margin-top: 40px; display: flex; flex-direction: column; gap: 12px; }
  .bz-faq-item { border: 1px solid var(--line); border-radius: var(--radius-lg); background: var(--surface-1); overflow: hidden; transition: border-color var(--dur-fast); }
  .bz-faq-item.bz-open { border-color: var(--bizo-orange-300); }
  .bz-faq-q { width: 100%; display: flex; justify-content: space-between; align-items: center; gap: 14px; padding: 19px 22px; background: none; border: none; cursor: pointer; font-family: var(--font-display); font-weight: 600; font-size: 18px; color: var(--text-strong); text-align: right; }
  .bz-faq-ic { font-size: 24px; color: var(--bizo-orange-500); flex: none; font-weight: 400; line-height: 1; }
  .bz-faq-a { max-height: 0; overflow: hidden; transition: max-height var(--dur-base) var(--ease-standard); }
  .bz-faq-item.bz-open .bz-faq-a { max-height: 220px; }
  .bz-faq-a p { margin: 0; padding: 0 22px 20px; color: var(--text-body); font-size: 16px; line-height: 1.65; }

  /* ---------- ACTION MODULE ---------- */
  .bz-action { padding: 88px 0; background: radial-gradient(120% 100% at 50% 0%, #FFE6BD, #F2960C 90%); }
  .bz-action-in { text-align: center; max-width: 660px; }
  .bz-action-bot { width: 88px; height: 88px; border-radius: 50%; box-shadow: 0 10px 28px rgba(107,60,15,.32); border: 3px solid rgba(255,255,255,.72); }
  .bz-action h2 { font-size: 42px; font-weight: 800; letter-spacing: -.02em; margin: 18px 0 0; color: #4A2A07; line-height: 1.15; }
  .bz-action p { font-size: 18px; color: #6B3C0F; margin: 14px 0 26px; line-height: 1.55; }
  .bz-action-micro { font-size: 13.5px; color: rgba(74,42,7,.7); font-weight: 600; margin-top: 12px; }

  /* ---------- STICKY MOBILE CTA ---------- */
  .bz-sticky-cta { position: fixed; bottom: 0; inset-inline-start: 0; inset-inline-end: 0; padding: 12px 16px 18px; background: rgba(255,255,255,.92); backdrop-filter: blur(10px); border-top: 1px solid var(--line); display: none; justify-content: center; z-index: 200; }
  @media (max-width: 640px) { .bz-sticky-cta { display: flex; } }

  /* ---------- FOOTER ---------- */
  .bz-footer { background: var(--ink-900); color: rgba(255,255,255,.72); padding: 40px 0 0; }
  .bz-footer-in { display: flex; flex-direction: column; align-items: center; gap: 12px; text-align: center; }
  .bz-footer .bz-logo { color: #fff; }
  .bz-footer-tag { font-size: 15px; margin: 0; }
  .bz-footer-links { display: flex; gap: 22px; }
  .bz-footer-links a { color: rgba(255,255,255,.72); text-decoration: none; font-size: 14.5px; }
  .bz-footer-links a:hover { color: #fff; }
  .bz-copy { text-align: center; padding: 24px 0; margin-top: 30px; border-top: 1px solid rgba(255,255,255,.12); font-size: 13px; color: rgba(255,255,255,.5); }

  /* ---------- shared section headings ---------- */
  .bz-st { font-size: 38px; font-weight: 800; letter-spacing: -.02em; text-align: center; margin-bottom: 0; }
  .bz-ss { text-align: center; font-size: 17.5px; color: var(--text-muted); margin: 12px auto 0; max-width: 42em; line-height: 1.6; }

  /* ---------- responsive ---------- */
  @media (max-width: 920px) {
    .bz-hero-in { grid-template-columns: 1fr; }
    .bz-hero-copy h1 { font-size: 44px; }
    .bz-hero-copy { padding: 40px 0; }
    .bz-hero-visual { height: 380px; align-self: auto; order: 2; }
    .bz-robot { width: 82%; height: 100%; }
    .bz-before-after { grid-template-columns: 1fr; }
    .bz-arrow { transform: rotate(90deg); }
    .bz-not-grid, .bz-testi-grid { grid-template-columns: 1fr; }
    .bz-mech-in { grid-template-columns: 1fr; }
    .bz-mech-gif { position: static; order: -1; }
    .bz-vf-in { grid-template-columns: 1fr; }
    .bz-vf-outputs { flex-direction: column; }
    .bz-tiers { grid-template-columns: 1fr; }
    .bz-tier-pop { transform: none; }
    .bz-st { font-size: 30px; }
  }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel" src="PhoneDemo.jsx" data-presets="react"></script>
<script type="text/babel" src="Sections.jsx" data-presets="react"></script>
<script type="text/babel" data-presets="react">
  const mount = () => {
    if (!window.Landing || !window.PhoneDemo || !window.BizODesignSystem_9b23bd) { setTimeout(mount, 40); return; }
    ReactDOM.createRoot(document.getElementById('root')).render(<window.Landing />);
  };
  mount();
</script>
</body>
</html>
